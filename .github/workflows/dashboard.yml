name: Actualizar Dashboard DAM Diariamente

on:
  push:
    branches: [ main ] # Se ejecutará cada vez que subas código para que lo veas ya
  schedule:
    - cron: '0 10 * * *' # Se ejecutará todos los días a las 10:00 UTC (6:00 AM EDT)
  workflow_dispatch: # Permite disparar el workflow manualmente desde la pestaña Actions

permissions:
  contents: write # Necesario para que el bot pueda hacer commit y push del reporte

jobs:
  actualizar-web:
    runs-on: ubuntu-latest
    
    steps:
    - name: Traer el código
      uses: actions/checkout@v4
      
    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Instalar librerías
      run: pip install -r requirements.txt

    - name: Actualizar datos del DAM
      env:
        GRIDSTATUS_API_KEY: ${{ secrets.GRIDSTATUS_API_KEY }}
      run: python src/update_data.py

    - name: Ejecutar algoritmo y crear HTML
      run: python src/generar_web.py

    - name: Guardar la nueva web en GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Bot de LRG"
        git add data/ieso_dam_prices.csv docs/index.html
        git commit -m "Reporte automático generado" || echo "Sin cambios nuevos"
        git pull --rebase origin main
        git push